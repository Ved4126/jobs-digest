name: Jobs Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

jobs:
  run-jobs-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager beautifulsoup4 python-dotenv requests

      - name: Create .env file
        run: |
          cat > .env <<EOF
          JOB_KEYWORDS=${{ secrets.JOB_KEYWORDS }}
          JOB_LOCATION=${{ secrets.JOB_LOCATION }}
          MAX_RESULTS=${{ secrets.MAX_RESULTS }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          FROM_EMAIL=${{ secrets.FROM_EMAIL }}
          TO_EMAIL=${{ secrets.TO_EMAIL }}
          DB_PATH=seen_jobs.db
          EOF

      - name: Run script
        run: python google_jobs_digest.py