name: Jobs Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

jobs:
  run-jobs-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager beautifulsoup4 python-dotenv requests

      - name: Create .env file
        run: |
          echo "JOB_KEYWORDS=${{ secrets.JOB_KEYWORDS }}" >> .env
          echo "JOB_LOCATION=${{ secrets.JOB_LOCATION }}" >> .env
          echo "MAX_RESULTS=${{ secrets.MAX_RESULTS }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "FROM_EMAIL=${{ secrets.FROM_EMAIL }}" >> .env
          echo "TO_EMAIL=${{ secrets.TO_EMAIL }}" >> .env
          echo "DB_PATH=seen_jobs.db" >> .env

      - name: Restore seen jobs database
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.db
          key: seen-jobs-db-${{ github.run_id }}
          restore-keys: |
            seen-jobs-db-

      - name: Run scraper
        run: python scrape_google_jobs.py

      - name: Filter jobs
        run: python filter_jobs.py

      - name: Send email
        run: python send_jobs_email.py